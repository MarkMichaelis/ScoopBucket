name: Pester Light Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  pester:
    name: Light suite (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable | Format-Table -AutoSize

      - name: Run Pester Light tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./bucket/Invoke-Tests.ps1 -Tag Light
