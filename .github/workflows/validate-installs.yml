name: Validate Package Installs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  verify-versions:
    name: Verify (and auto-fix) manifest version bumps
    runs-on: windows-latest
    permissions:
      contents: write
    concurrency:
      group: verify-versions-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        shell: pwsh
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Verify (or auto-fix) manifest version bumps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & pwsh -NoProfile -File ./Test-ManifestVersionBumps.ps1 -Amend -Push -Branch '${{ github.ref_name }}'
          $code = $LASTEXITCODE
          if ($code -ne 0) { exit $code }
          $triggered = '${{ github.sha }}'
          $current   = (git rev-parse HEAD).Trim()
          if ($triggered -ne $current) {
            Write-Host "::warning::Auto-corrected missing manifest version bump on main: $triggered -> $current. Install the opt-in pre-push hook (git config core.hooksPath .githooks) to have this happen locally."
          }

  validate-installs:
    name: Install & Validate Packages
    needs: verify-versions
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Resolve artifact paths
        shell: pwsh
        run: |
          # All CI test artifacts land under $env:TEMP\ScoopBucket\<kind>\
          # (managed by the module's Save-Artifact helper: rotates 5
          # newest snapshots and prunes anything older than 1 day).
          # Export the root so downstream steps can read latest.json and
          # so upload-artifact can reference an absolute path.
          $artifactDir = Join-Path $env:TEMP 'ScoopBucket'
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          "ARTIFACT_DIR=$artifactDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Artifact dir: $artifactDir"

      - name: Accept winget source agreements
        shell: pwsh
        run: |
          # winget sources occasionally land in a corrupted/stale state on
          # fresh runners (exit 0x8A15000F "Data required by the source is
          # missing" on subsequent installs). Reset + re-add + update gives
          # us a clean baseline before any install attempt.
          Write-Host "winget source reset --force"
          winget source reset --force --disable-interactivity 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host "winget source update --accept-source-agreements"
          winget source update --accept-source-agreements --disable-interactivity 2>&1 | ForEach-Object { Write-Host $_ }
          winget source list

      - name: Bootstrap Chocolatey
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          if (-not (Get-Command choco -ErrorAction Ignore)) {
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco feature enable -n allowGlobalConfirmation
          choco feature enable -n allowEmptyChecksums

      - name: Bootstrap Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          if (-not (Get-Command scoop -ErrorAction Ignore)) {
            $env:SCOOP = "$env:ProgramData\scoop"
            [Environment]::SetEnvironmentVariable('SCOOP', $env:SCOOP, 'Machine')
            Invoke-Expression "& {$(Invoke-RestMethod get.scoop.sh)} -RunAsAdmin"
          }
          # Ensure scoop shims are on PATH for this and all subsequent steps
          $scoopShims = Join-Path $env:ProgramData 'scoop\shims'
          if ($env:Path -notlike "*$scoopShims*") {
            $env:Path = "$scoopShims;$env:Path"
          }
          # Persist for subsequent steps via GITHUB_PATH
          if ($env:GITHUB_PATH) {
            $scoopShims | Out-File -FilePath $env:GITHUB_PATH -Append
          }
          # Verify scoop is now available
          Write-Host "Scoop location: $(Get-Command scoop -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)"
          scoop --version

      - name: Install Git & add Scoop buckets
        shell: pwsh
        run: |
          if (-not (Get-Command git -ErrorAction Ignore)) {
            choco install git -y --params "/GitOnlyOnPath /NoAutoCrlf /NoShellHereIntegration"
            $env:Path = "$env:Path;$env:ProgramFiles\Git\cmd\"
          }
          scoop bucket add MarkMichaelis https://github.com/MarkMichaelis/ScoopBucket
          scoop bucket add extras

      - name: Run install validation
        id: test
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          # NOTE: -Cleanup is intentionally NOT passed here. Subsequent steps
          # ("Apply post-install hooks", "CLI availability discovery",
          # "CLI availability — pinned contract") all depend on installs
          # persisting through the job. The runner image is discarded at
          # end-of-job so no state leaks anyway. -Cleanup is a dev-box
          # convenience for running Test-Installs.ps1 locally — see README
          # "Heavy validate-installs — local cleanup" for details.
          & "${{ github.workspace }}\.github\scripts\Test-Installs.ps1"

      - name: Apply post-install hooks (PATH/shim sidecars)
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          & "${{ github.workspace }}\.github\scripts\Invoke-PostInstallHooks.ps1"

      - name: CLI availability discovery (#45 Phase 2, non-failing)
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          # Get-PackageCommands.ps1 now self-writes via Save-Artifact to
          # $env:TEMP\ScoopBucket\cli-availability\latest.json (plus
          # rotating timestamped snapshots).
          & "${{ github.workspace }}\.github\scripts\Get-PackageCommands.ps1" -Quiet | Out-Null
          # Run the Pester scaffold (also non-failing).
          Invoke-Pester -Path "${{ github.workspace }}\bucket\PackageCommands.Tests.ps1" -Tag Heavy -Output Detailed -PassThru | Out-Null

      - name: CLI availability — write step summary
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $jsonPath = Join-Path $env:ARTIFACT_DIR 'cli-availability\latest.json'
          if (-not (Test-Path $jsonPath)) {
            "## CLI availability discovery`n`n_No results produced._" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            return
          }
          $rows = Get-Content $jsonPath -Raw | ConvertFrom-Json
          if ($null -eq $rows) { $rows = @() }
          $considered = @($rows | Where-Object { $_.ExpectedCli })
          $available  = @($considered | Where-Object { $_.Available })
          $missing    = @($considered | Where-Object { -not $_.Available })
          $sb = [System.Text.StringBuilder]::new()
          [void]$sb.AppendLine("## CLI availability discovery (#45 Phase 2)")
          [void]$sb.AppendLine("")
          [void]$sb.AppendLine("- Total package entries: **$($rows.Count)**")
          [void]$sb.AppendLine("- With expected CLI: **$($considered.Count)**")
          [void]$sb.AppendLine("- Available on PATH: **$($available.Count)**")
          [void]$sb.AppendLine("- Missing: **$($missing.Count)**")
          [void]$sb.AppendLine("")
          if ($missing.Count -gt 0) {
            [void]$sb.AppendLine("### Missing CLIs")
            [void]$sb.AppendLine("")
            [void]$sb.AppendLine("| Source | Package | Expected CLI | OnDiskPath | HelpFlag |")
            [void]$sb.AppendLine("|---|---|---|---|---|")
            foreach ($m in $missing) {
              $onDisk   = if ($m.PSObject.Properties['OnDiskPath']) { $m.OnDiskPath } else { '' }
              $helpFlag = if ($m.PSObject.Properties['HelpFlag'])   { $m.HelpFlag   } else { '' }
              [void]$sb.AppendLine("| $($m.Source) | $($m.PackageId) | ``$($m.ExpectedCli)`` | $onDisk | $helpFlag |")
            }
          }
          $sb.ToString() | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: CLI availability — pinned contract (enforcing)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $result = Invoke-Pester -Path "${{ github.workspace }}\bucket\CliAvailabilityPinned.Tests.ps1" -Tag Heavy -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Host "::error::Pinned CLI contract regressed: $($result.FailedCount) of $($result.TotalCount) checks failed."
            exit 1
          }
          Write-Host "Pinned CLI contract held: $($result.PassedCount)/$($result.TotalCount) checks passed."

      - name: CLI completion — per-bundle native registration (pinned)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $result = Invoke-Pester -Path "${{ github.workspace }}\bucket\CompletionPinned.Tests.ps1" -Tag Heavy,CompletionPinned -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Host "::error::Per-bundle completion contract regressed: $($result.FailedCount) of $($result.TotalCount) checks failed."
            exit 1
          }
          Write-Host "Per-bundle completion contract intact: $($result.PassedCount)/$($result.TotalCount) checks passed."

      - name: CLI completion — bundle entry-point + idempotency
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $result = Invoke-Pester -Path "${{ github.workspace }}\bucket\CompletionIdempotency.Tests.ps1" -Tag Heavy,Idempotency -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Host "::error::CLI completion bundle tests failed: $($result.FailedCount) of $($result.TotalCount)."
            exit 1
          }
          Write-Host "CLI completion bundle tests passed: $($result.PassedCount)/$($result.TotalCount)."

      - name: CLI completion — native command output (behavioural)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $result = Invoke-Pester -Path "${{ github.workspace }}\bucket\CliCompletionOutput.Tests.ps1" -Tag Heavy,CompletionOutput -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Host "::error::CLI completion native-output tests failed: $($result.FailedCount) of $($result.TotalCount)."
            exit 1
          }
          Write-Host "CLI completion native-output tests: $($result.PassedCount) passed, $($result.SkippedCount) skipped, $($result.TotalCount) total."

      - name: Upload CLI availability artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cli-availability
          path: ${{ env.ARTIFACT_DIR }}/cli-availability/latest.json
          retention-days: 30

      - name: Ensure issue labels exist
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "install-failure" --description "Automated: package install failed in CI" --color "d73a4a" --force
          gh label create "automated" --description "Created by CI workflow" --color "0075ca" --force
          gh label create "verification-failure" --description "Automated: post-install verification failed" --color "e4e669" --force

      - name: File issues for failures
        if: always() && steps.test.outputs.has_failures == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $results = Get-Content (Join-Path $env:ARTIFACT_DIR 'test-results\latest.json') | ConvertFrom-Json
          $failures = $results | Where-Object { $_.Status -eq 'fail' }
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          foreach ($pkg in $failures) {
            $title = "[CI] Install failure: $($pkg.Name) ($($pkg.InstallerType))"

            # Check for existing open issue to avoid duplicates
            $existing = gh issue list --search "in:title `"$title`"" --state open --json number --jq '.[].number' 2>$null
            if ($existing) {
              Write-Host "Issue already open for $($pkg.Name): #$existing — adding comment"
              $commentBody = @"
          ### Re-occurrence on $(Get-Date -Format 'yyyy-MM-dd')

          This failure was detected again in [workflow run]($runUrl).

          **Exit Code:** ``$($pkg.ExitCode)``
          **Error:**
          ``````
          $($pkg.ErrorOutput)
          ``````
          "@
              gh issue comment $existing.Split("`n")[0].Trim() --body $commentBody
              continue
            }

            $body = @"
          ## Package Install Failure

          | Field | Value |
          |---|---|
          | **Package** | $($pkg.Name) |
          | **ID** | $($pkg.PackageId) |
          | **Installer** | $($pkg.InstallerType) |
          | **Source Script** | $($pkg.SourceScript) |
          | **Exit Code** | $($pkg.ExitCode) |
          | **Workflow Run** | [View Run]($runUrl) |

          ### Error Output
          ``````
          $($pkg.ErrorOutput)
          ``````

          ### Command Attempted
          ``````
          $($pkg.Command)
          ``````

          ---
          *This issue was automatically created by the CI validation workflow.*
          "@

            Write-Host "Creating issue for: $($pkg.Name)"
            gh issue create --title $title --body $body --label "install-failure" --label "automated"
          }

      - name: File issue for workflow-level failure
        if: (failure() || cancelled()) && steps.test.outputs.has_failures != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $title = "[CI] Workflow failure: validate-installs (${{ github.sha }})"

          # Check for existing open issue to avoid duplicates
          $existing = gh issue list --search "in:title `"[CI] Workflow failure: validate-installs`"" --state open --json number --jq '.[].number' 2>$null
          if ($existing) {
            $commentBody = @"
          ### Re-occurrence on $(Get-Date -Format 'yyyy-MM-dd')

          The workflow failed again in [run]($runUrl).
          Commit: ``${{ github.sha }}``
          "@
            gh issue comment $existing.Split("`n")[0].Trim() --body $commentBody
          } else {
            $body = @"
          ## Workflow-Level Failure

          The **validate-installs** workflow failed before individual package results could be recorded.
          This typically means a prerequisite tool (scoop, choco, git, etc.) was not available or a
          setup step crashed.

          | Field | Value |
          |---|---|
          | **Workflow Run** | [View Run]($runUrl) |
          | **Commit** | ``${{ github.sha }}`` |
          | **Branch** | ``${{ github.ref_name }}`` |
          | **Triggered by** | ``${{ github.actor }}`` |

          Please check the workflow logs for the root cause.

          ---
          *This issue was automatically created by the CI validation workflow.*
          "@
            gh issue create --title $title --body $body --label "install-failure" --label "automated"
          }

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-validation-results
          path: ${{ env.ARTIFACT_DIR }}/test-results/latest.json
          retention-days: 30
